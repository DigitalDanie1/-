<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>채굴이의 싱달러 채굴일지 슬라이드 덱</title>
    <style>
      :root {
        --bg: #f3f0ea;
        --ink: #1d1d1f;
        --muted: #74706a;
        --line: #202020;
        --panel: #ffffff;
        --paper: #fffefa;
        --deck: #282828;
        --deck-2: #333333;
        --soft: #e6dfd3;
        --accent: #f2c94c;
        --mint: #bdebdc;
        --red: #e85c4a;
        --shadow: 0 18px 50px rgba(20, 20, 20, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 1px solid #bfb8ae;
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font-weight: 800;
      }

      button:hover {
        border-color: var(--line);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.16);
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #c9c0b5;
        border-radius: 6px;
        background: var(--paper);
        color: var(--ink);
        outline: none;
      }

      input,
      select {
        height: 40px;
        padding: 0 10px;
      }

      textarea {
        min-height: 86px;
        padding: 10px;
        line-height: 1.55;
        resize: vertical;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #5f5a53;
        font-size: 12px;
        font-weight: 900;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid #d6d0c7;
        background: rgba(255, 255, 255, 0.94);
        padding: 10px 16px;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
        white-space: nowrap;
      }

      .brand input {
        max-width: 520px;
        height: 34px;
        border-color: transparent;
        background: #f8f5ef;
        font-weight: 800;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .actions button,
      .actions select {
        height: 34px;
        padding: 0 11px;
        font-size: 13px;
      }

      .primary {
        background: var(--red);
        border-color: #b83d31;
        color: #fff;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 0;
        min-height: 0;
      }

      .deck-area {
        min-width: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          var(--deck);
        background-size: 72px 72px;
        padding: 22px;
        overflow: auto;
      }

      .deck-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
        color: #e9e4dc;
      }

      .deck-meta strong {
        font-size: 15px;
      }

      .deck-meta span {
        color: #bdb7af;
        font-size: 13px;
        font-weight: 800;
      }

      .slide-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 28px 30px;
        align-items: start;
      }

      .slide-wrap {
        display: grid;
        gap: 7px;
      }

      .page-label {
        color: #d8d2cb;
        font-size: 12px;
        font-weight: 850;
      }

      .slide-card {
        position: relative;
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 0;
        border-radius: 0;
        background: transparent;
        padding: 0;
        box-shadow: none;
      }

      .slide-card:hover {
        transform: none;
        box-shadow: none;
      }

      .slide-card.active .slide-page {
        outline: 4px solid var(--accent);
        outline-offset: 4px;
      }

      .slide-page {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 1px solid #d3d3d3;
        background: #fff;
        box-shadow: 0 7px 18px rgba(0, 0, 0, 0.34);
      }

      .slide-text {
        position: absolute;
        left: 11%;
        right: 11%;
        top: 13%;
        text-align: center;
        color: #202020;
        font-size: clamp(14px, 1.45vw, 22px);
        font-weight: 650;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: keep-all;
      }

      .slide-main {
        position: absolute;
        left: 9%;
        right: 9%;
        top: 43%;
        transform: translateY(-50%);
        text-align: center;
        font-size: clamp(24px, 2.8vw, 42px);
        font-weight: 950;
        line-height: 1.2;
        word-break: keep-all;
        white-space: pre-wrap;
      }

      .slide-note {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 10%;
        text-align: center;
        color: #4b4946;
        font-size: clamp(12px, 1.1vw, 16px);
        font-weight: 750;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: keep-all;
      }

      .bubble {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 13%;
        border: 2px solid #202020;
        border-radius: 18px;
        background: #fff;
        padding: 12px;
        text-align: center;
        font-size: clamp(13px, 1.2vw, 18px);
        font-weight: 900;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: keep-all;
      }

      .bubble::after {
        content: "";
        position: absolute;
        left: 24%;
        bottom: -12px;
        width: 20px;
        height: 20px;
        border-right: 2px solid #202020;
        border-bottom: 2px solid #202020;
        background: #fff;
        transform: rotate(45deg);
      }

      .slide-card.emphasis .slide-main {
        top: 55%;
      }

      .slide-card.bubble-layout .slide-text {
        top: 11%;
      }

      .slide-card.bubble-layout .slide-main {
        display: none;
      }

      .slide-card.note-layout .slide-text {
        top: 18%;
        font-size: clamp(16px, 1.8vw, 26px);
      }

      .slide-card.note-layout .slide-note {
        bottom: 18%;
        font-size: clamp(16px, 1.7vw, 24px);
        font-weight: 950;
      }

      .slide-card.cover-layout .slide-text {
        top: 16%;
        font-size: clamp(13px, 1.2vw, 18px);
        color: #5a5752;
      }

      .slide-card.cover-layout .slide-main {
        top: 51%;
        font-size: clamp(32px, 4vw, 56px);
      }

      .side-panel {
        min-width: 0;
        border-left: 1px solid #d3cbc0;
        background: #fbf8f2;
        overflow: auto;
      }

      .side-head {
        position: sticky;
        top: 55px;
        z-index: 10;
        border-bottom: 1px solid #d3cbc0;
        background: #fbf8f2;
        padding: 14px;
      }

      .side-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .side-head p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .editor {
        display: grid;
        gap: 13px;
        padding: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .mini-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .mini-actions button {
        min-height: 36px;
      }

      .layout-pills {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .layout-pills button {
        min-height: 38px;
        font-size: 12px;
      }

      .layout-pills button.active {
        background: var(--mint);
        border-color: var(--line);
      }

      .output {
        border-top: 1px solid #d3cbc0;
        padding: 14px;
      }

      .output-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .output h3 {
        margin: 0;
        font-size: 15px;
      }

      .output button {
        min-height: 32px;
        padding: 0 9px;
        font-size: 12px;
      }

      pre {
        margin: 0;
        max-height: 310px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid #d3cbc0;
        border-radius: 6px;
        background: #fff;
        padding: 11px;
        color: #5f5a53;
        font-size: 12px;
        font-weight: 750;
        line-height: 1.55;
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .side-panel {
          border-left: 0;
          border-top: 1px solid #d3cbc0;
        }

        .side-head {
          top: 0;
        }
      }

      @media (max-width: 720px) {
        .toolbar,
        .brand,
        .row {
          grid-template-columns: 1fr;
          display: grid;
        }

        .actions {
          justify-content: stretch;
        }

        .actions button,
        .actions select {
          flex: 1;
        }

        .deck-area {
          padding: 14px;
        }

        .slide-grid {
          grid-template-columns: 1fr;
          gap: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div class="brand">
          <h1>채굴이 슬라이드 덱</h1>
          <input id="deckTitle" value="쇼피 프로틴 가격 편" aria-label="덱 제목" />
        </div>
        <div class="actions">
          <select id="deckSize" aria-label="페이지 수">
            <option value="4">4페이지</option>
            <option value="8" selected>8페이지</option>
            <option value="12">12페이지</option>
            <option value="16">16페이지</option>
          </select>
          <button id="sampleBtn" type="button">예시</button>
          <button id="addPageBtn" type="button">페이지 추가</button>
          <button id="duplicatePageBtn" type="button">복제</button>
          <button id="downloadBtn" class="primary" type="button">TXT 다운로드</button>
        </div>
      </header>

      <section class="workspace">
        <section class="deck-area">
          <div class="deck-meta">
            <strong id="deckName">쇼피 프로틴 가격 편</strong>
            <span id="deckStatus">8 pages · Google Slides style board</span>
          </div>
          <div class="slide-grid" id="slideGrid"></div>
        </section>

        <aside class="side-panel">
          <div class="side-head">
            <h2 id="editorHeading">페이지 1 편집</h2>
            <p>흰 슬라이드 위에 들어갈 문장을 바로 적습니다.</p>
          </div>

          <div class="editor">
            <div class="row">
              <div>
                <label for="episode">회차</label>
                <input id="episode" value="D+370" />
              </div>
              <div>
                <label for="tone">톤</label>
                <select id="tone">
                  <option>미니멀</option>
                  <option selected>병맛</option>
                  <option>짠함</option>
                  <option>정보형</option>
                </select>
              </div>
            </div>

            <div>
              <label>레이아웃</label>
              <div class="layout-pills" id="layoutPills">
                <button class="active" type="button" data-layout="plain">한 문장</button>
                <button type="button" data-layout="emphasis">강조형</button>
                <button type="button" data-layout="bubble-layout">말풍선</button>
                <button type="button" data-layout="cover-layout">표지/펀치</button>
              </div>
            </div>

            <div>
              <label for="topText">상단 문장</label>
              <textarea id="topText" placeholder="예: 우리는 종종 말에 갇힌다"></textarea>
            </div>

            <div>
              <label for="mainText">가운데 큰 문장</label>
              <textarea id="mainText" placeholder="예: 프로틴 → 월세"></textarea>
            </div>

            <div>
              <label for="bubbleText">말풍선 / 캐릭터 대사</label>
              <textarea id="bubbleText" placeholder="예: 이게 단백질이야 월세야?"></textarea>
            </div>

            <div>
              <label for="bottomText">하단 문장 / 넘김 유도</label>
              <textarea id="bottomText" placeholder="예: 헬스는 내일부터. 통장 회복 먼저."></textarea>
            </div>

            <div>
              <label for="imageMemo">이미지/소품 메모</label>
              <textarea id="imageMemo" placeholder="예: 하얀 광부 캐릭터, 커피, 쇼피 앱, S$ 코인"></textarea>
            </div>

            <div class="mini-actions">
              <button id="prevBtn" type="button">이전 페이지</button>
              <button id="nextBtn" type="button">다음 페이지</button>
              <button id="clearBtn" type="button">현재 페이지 비우기</button>
              <button id="deleteBtn" type="button">삭제</button>
            </div>
          </div>

          <section class="output">
            <div class="output-head">
              <h3>슬라이드 원고</h3>
              <button type="button" data-copy="scriptOutput">복사</button>
            </div>
            <pre id="scriptOutput"></pre>
          </section>

          <section class="output">
            <div class="output-head">
              <h3>이미지 프롬프트</h3>
              <button type="button" data-copy="promptOutput">복사</button>
            </div>
            <pre id="promptOutput"></pre>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const exampleSlides = [
        {
          layout: "plain",
          top: "싱가포르에서 프로틴을 사려고 했다",
          main: "",
          bubble: "",
          bottom: "",
          memo: "미니멀 흰 배경, 작은 쇼피 앱 아이콘, 채굴이 실루엣"
        },
        {
          layout: "plain",
          top: "쇼피 검색창에 단백질을 쳤다",
          main: "",
          bubble: "",
          bottom: "",
          memo: "휴대폰 화면, 검색창, 하얀 광부 캐릭터"
        },
        {
          layout: "plain",
          top: "가격을 보는 순간 조용해졌다",
          main: "",
          bubble: "",
          bottom: "",
          memo: "가격표, S$ 코인, 커피컵"
        },
        {
          layout: "bubble-layout",
          top: "분명 근육을 키우려던 건데",
          main: "",
          bubble: "이게 단백질이야 월세야?",
          bottom: "",
          memo: "말풍선, 작은 채굴이, 프로틴통"
        },
        {
          layout: "emphasis",
          top: "싱달러 채굴 난이도",
          main: "급상승",
          bubble: "",
          bottom: "",
          memo: "S$ 코인이 광산 수레에 담겨 빠져나감"
        },
        {
          layout: "plain",
          top: "장바구니는 헬스장이 아니라 예산 회의장이 됐다",
          main: "",
          bubble: "",
          bottom: "",
          memo: "장바구니 금액, 계산기, 커피"
        },
        {
          layout: "cover-layout",
          top: "오늘의 결론",
          main: "벌크업은\n카페인으로",
          bubble: "",
          bottom: "",
          memo: "채굴이가 커피 들고 체념"
        },
        {
          layout: "plain",
          top: "헬스는 내일부터.\n통장 회복 먼저.",
          main: "",
          bubble: "",
          bottom: "오늘도 S$ 채굴 중...",
          memo: "미니멀 엔딩, S$ 코인, 작은 머라이언"
        }
      ];

      let slides = structuredClone(exampleSlides);
      let activeIndex = 0;

      const deckTitleEl = document.querySelector("#deckTitle");
      const deckNameEl = document.querySelector("#deckName");
      const deckStatusEl = document.querySelector("#deckStatus");
      const slideGridEl = document.querySelector("#slideGrid");
      const editorHeadingEl = document.querySelector("#editorHeading");
      const deckSizeEl = document.querySelector("#deckSize");
      const episodeEl = document.querySelector("#episode");
      const toneEl = document.querySelector("#tone");
      const layoutPillsEl = document.querySelector("#layoutPills");
      const scriptOutputEl = document.querySelector("#scriptOutput");
      const promptOutputEl = document.querySelector("#promptOutput");

      const fields = {
        top: document.querySelector("#topText"),
        main: document.querySelector("#mainText"),
        bubble: document.querySelector("#bubbleText"),
        bottom: document.querySelector("#bottomText"),
        memo: document.querySelector("#imageMemo")
      };

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function activeSlide() {
        return slides[activeIndex];
      }

      function slideMarkup(slide, index) {
        return `
          <div class="slide-wrap">
            <div class="page-label">페이지 ${index + 1}</div>
            <button class="slide-card ${slide.layout || "plain"} ${index === activeIndex ? "active" : ""}" type="button" data-slide="${index}">
              <div class="slide-page">
                ${slide.top ? `<div class="slide-text">${escapeHtml(slide.top)}</div>` : ""}
                ${slide.main ? `<div class="slide-main">${escapeHtml(slide.main)}</div>` : ""}
                ${slide.bubble ? `<div class="bubble">${escapeHtml(slide.bubble)}</div>` : ""}
                ${slide.bottom ? `<div class="slide-note">${escapeHtml(slide.bottom)}</div>` : ""}
              </div>
            </button>
          </div>
        `;
      }

      function syncEditor() {
        const slide = activeSlide();
        fields.top.value = slide.top || "";
        fields.main.value = slide.main || "";
        fields.bubble.value = slide.bubble || "";
        fields.bottom.value = slide.bottom || "";
        fields.memo.value = slide.memo || "";
        editorHeadingEl.textContent = `페이지 ${activeIndex + 1} 편집`;
        layoutPillsEl.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("active", button.dataset.layout === (slide.layout || "plain"));
        });
      }

      function syncSlide() {
        const slide = activeSlide();
        slide.top = fields.top.value;
        slide.main = fields.main.value;
        slide.bubble = fields.bubble.value;
        slide.bottom = fields.bottom.value;
        slide.memo = fields.memo.value;
        render();
      }

      function renderOutputs() {
        const title = deckTitleEl.value.trim();
        const episode = episodeEl.value.trim();
        const tone = toneEl.value;
        scriptOutputEl.textContent = `${episode} ${title}\n\n` + slides
          .map((slide, index) => `페이지 ${index + 1}
상단: ${slide.top || "-"}
강조: ${slide.main || "-"}
말풍선: ${slide.bubble || "-"}
하단: ${slide.bottom || "-"}`)
          .join("\n\n");

        promptOutputEl.textContent = slides
          .map((slide, index) => `페이지 ${index + 1} 이미지 지시
스타일: 미니멀한 흰 정사각형 인스타 슬라이드, 한국어 타이포 중심, 여백이 넓은 Google Slides/PPT 느낌, ${tone} 톤
텍스트: ${[slide.top, slide.main, slide.bubble, slide.bottom].filter(Boolean).join(" / ") || "-"}
소품/장면: ${slide.memo || "채굴이, 노란 광부 헬멧, 커피, S$ 코인, 싱가포르 생활감"}`)
          .join("\n\n");
      }

      function render() {
        deckNameEl.textContent = deckTitleEl.value || "무제";
        deckStatusEl.textContent = `${slides.length} pages · Google Slides style board`;
        deckSizeEl.value = String([4, 8, 12, 16].includes(slides.length) ? slides.length : 8);
        slideGridEl.innerHTML = slides.map(slideMarkup).join("");
        renderOutputs();
      }

      function selectSlide(index) {
        activeIndex = Math.max(0, Math.min(index, slides.length - 1));
        syncEditor();
        render();
      }

      function blankSlide(number) {
        return {
          layout: "plain",
          top: `새 문장을 적어보자`,
          main: "",
          bubble: "",
          bottom: "",
          memo: `페이지 ${number} 이미지 메모`
        };
      }

      function setDeckSize(size) {
        while (slides.length < size) slides.push(blankSlide(slides.length + 1));
        if (slides.length > size) slides = slides.slice(0, size);
        selectSlide(Math.min(activeIndex, slides.length - 1));
      }

      function addPage(copyCurrent = false) {
        const next = copyCurrent ? structuredClone(activeSlide()) : blankSlide(slides.length + 1);
        slides.splice(activeIndex + 1, 0, next);
        selectSlide(activeIndex + 1);
      }

      function deletePage() {
        if (slides.length <= 1) return;
        slides.splice(activeIndex, 1);
        selectSlide(Math.min(activeIndex, slides.length - 1));
      }

      function clearPage() {
        slides[activeIndex] = { layout: "plain", top: "", main: "", bubble: "", bottom: "", memo: "" };
        syncEditor();
        render();
      }

      function downloadTxt() {
        const body = [
          "# 슬라이드 원고",
          scriptOutputEl.textContent,
          "",
          "# 이미지 프롬프트",
          promptOutputEl.textContent
        ].join("\n");
        const blob = new Blob([body], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${episodeEl.value}-${deckTitleEl.value}`.replace(/[^a-zA-Z0-9가-힣+.-]+/g, "-") + ".txt";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      deckTitleEl.addEventListener("input", render);
      episodeEl.addEventListener("input", renderOutputs);
      toneEl.addEventListener("change", renderOutputs);
      deckSizeEl.addEventListener("change", () => setDeckSize(Number(deckSizeEl.value)));
      document.querySelector("#sampleBtn").addEventListener("click", () => {
        slides = structuredClone(exampleSlides);
        activeIndex = 0;
        deckTitleEl.value = "쇼피 프로틴 가격 편";
        syncEditor();
        render();
      });
      document.querySelector("#addPageBtn").addEventListener("click", () => addPage(false));
      document.querySelector("#duplicatePageBtn").addEventListener("click", () => addPage(true));
      document.querySelector("#deleteBtn").addEventListener("click", deletePage);
      document.querySelector("#clearBtn").addEventListener("click", clearPage);
      document.querySelector("#prevBtn").addEventListener("click", () => selectSlide(activeIndex - 1));
      document.querySelector("#nextBtn").addEventListener("click", () => selectSlide(activeIndex + 1));
      document.querySelector("#downloadBtn").addEventListener("click", downloadTxt);

      slideGridEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-slide]");
        if (!button) return;
        selectSlide(Number(button.dataset.slide));
      });

      layoutPillsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-layout]");
        if (!button) return;
        activeSlide().layout = button.dataset.layout;
        syncEditor();
        render();
      });

      Object.values(fields).forEach((field) => {
        field.addEventListener("input", syncSlide);
      });

      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => {
          const target = document.querySelector(`#${button.dataset.copy}`);
          navigator.clipboard.writeText(target.textContent || "");
          button.textContent = "복사됨";
          window.setTimeout(() => {
            button.textContent = "복사";
          }, 900);
        });
      });

      syncEditor();
      render();
    </script>
  </body>
</html>
